- id: bin-wu
  name_en: Bin Wu
  name_zh: 吴滨
  title_en: Professor, PhD supervisor, School of Physics, Northwest University
  title_zh: 西北大学物理学院教授，博士生导师
  bio_en: |
    Received Bachelor of Science and Ph.D. degrees from Nankai University in 2010 and 2015, respectively. Serves as the primary instructor for courses such as Thermodynamics and Statistical Physics and Differential Geometry and General Relativity. Has earned multiple teaching honors, including a national award in the National Basic Physics Course Teaching Competition for Young Teachers in Higher Education, and a second prize in the Shaanxi Provincial University Young Teachers Teaching Competition. Serves as the Principal Investigator for three research projects, including funding from the National Natural Science Foundation of China (NSFC). Current research interests focus primarily on black hole physics, as well as related areas in thermodynamics and statistical physics.
  bio_zh: |
    于 2010年和 2015 年分别获得南开大学理学学士及理学博士学位。主讲《热力学与统计物理》《微分几何与广义相对论》等课程，曾获全国高等学校物理基础课程青年教师讲课比赛全国奖，陕西省高校青年教师教学竞赛二等奖等。主持国家自然科学基金等项目3项，目前主要研究兴趣为黑洞物理以及热力学与统计物理相关方向。

